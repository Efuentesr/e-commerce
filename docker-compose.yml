version: '3.9'

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ecomerce_db
      POSTGRES_USER: ecomerce_user
      POSTGRES_PASSWORD: ecomerce_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecomerce_user -d ecomerce_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py makemigrations accounts &&
             python manage.py makemigrations products &&
             python manage.py makemigrations sales &&
             python manage.py migrate &&
             python manage.py seed_data &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: "django-insecure-clave-dev-cambiar-en-produccion"
      DATABASE_URL: "postgres://ecomerce_user:ecomerce_pass@db:5432/ecomerce_db"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,0.0.0.0"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://localhost:8000/api"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_files:
