server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Todas las rutas van a index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos compilados
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
